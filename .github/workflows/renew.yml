name: Domain Renew

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 2:00（北京时间 10:00）
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install Chrome dependencies
        run: npx playwright install-deps chrome

      - name: Run domain renew
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node do_renew.js
        env:
          DOMAIN_ACCOUNT: ${{ secrets.DOMAIN_ACCOUNT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/

      - name: Keepalive
        run: |
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            date -u > .keepalive
            git add .keepalive
            git commit -m "chore: keepalive $(date -u +%Y-%m-%d)"
            git push

